name: Life Engine Tests

on:
  push:
    branches: [main]
    paths:
      - 'life-sim.html'
      - 'js/life-*.js'
      - 'data/life-*.json'
      - 'tests/life-*.test.mjs'
      - '.github/workflows/life-engine-tests.yml'
  pull_request:
    paths:
      - 'life-sim.html'
      - 'js/life-*.js'
      - 'data/life-*.json'
      - 'tests/life-*.test.mjs'
      - '.github/workflows/life-engine-tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test Full-screen Page Contract
        run: node tests/life-sim-page-v3.test.mjs
      - name: Test Life Engine Core
        run: node tests/life-engine-v3.test.mjs
      - name: Test Annual Event Vertical Slice
        run: node tests/life-event-engine-v3.test.mjs
      - name: Test Romance Stage Vertical Slice
        run: node tests/life-romance-engine-v3.test.mjs
      - name: Test Metric and Ending Engines
        run: node tests/life-metric-ending-v3.test.mjs
      - name: Test Save Archive and Achievements
        run: node tests/life-save-achievement-v3.test.mjs
      - name: Test Deterministic Simulation
        run: node tests/life-simulation-v3.test.mjs
      - name: Test UI View Models
        run: node tests/life-ui-model-v3.test.mjs
