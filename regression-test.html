<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Realm Ruckus WORLD M01 与 M02 浏览器回归测试">
  <title>WORLD 浏览器回归测试</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .test-summary{font-size:1.25rem;font-weight:700}.test-results{display:grid;gap:.75rem;padding:0;list-style:none}.test-results li{padding:1rem;border:1px solid currentColor;border-radius:.75rem}.test-results .pass{border-left:5px solid #067647}.test-results .fail{border-left:5px solid #b42318}.test-results pre{white-space:pre-wrap;word-break:break-word;margin:.75rem 0 0}.test-toolbar{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html">Realm Ruckus WORLD</a>
    <nav aria-label="主导航">
      <a href="./play.html">MVP</a>
      <a href="./dev.html">开发调试台</a>
      <a href="./dev-test.html">M01 自动验收</a>
      <a href="./regression-test.html" aria-current="page">回归测试</a>
    </nav>
  </header>
  <main class="page">
    <p class="eyebrow">M01 + M02 regression</p>
    <h1>浏览器回归测试</h1>
    <p class="lead">直接在浏览器中运行 M01 与 M02 的全部稳定行为测试。后续模块必须持续保持这些测试全部通过。</p>
    <section class="panel">
      <div class="test-toolbar">
        <button id="run-tests" type="button">重新运行全部测试</button>
        <span id="test-summary" class="test-summary" aria-live="polite">准备测试…</span>
      </div>
    </section>
    <section class="panel">
      <h2>测试结果</h2>
      <ol id="test-results" class="test-results"></ol>
    </section>
  </main>
  <footer>© 2026 Bostage Pte. Ltd. · Realm Ruckus™ · WORLD MVP</footer>
  <script id="regression-fallback">
    window.setTimeout(() => {
      const button = document.querySelector('#run-tests');
      const summary = document.querySelector('#test-summary');
      if (!button || button.dataset.bound === 'true') return;
      summary.textContent = '测试模块未成功加载。点击按钮重新载入页面。';
      button.addEventListener('click', () => window.location.reload());
    }, 1500);
  </script>
  <script type="module" src="./js/regression-browser-test.js"></script>
</body>
</html>
